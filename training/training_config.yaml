# Training configuration for LoRA fine-tuning of Stable Diffusion

model_id: "runwayml/stable-diffusion-v1-5"
dataset_path: "/data/skr155/SwatchMagic/data/dataset/hf_dataset"
output_dir: "weights/lora_weights_run_E"   # change per run: run_A, run_B, ...

learning_rate: 0.0001
num_epochs: 15
batch_size: 4
lora_rank: 16
image_size: 512
mixed_precision: "fp16"    # use "no" if you hit precision issues
lr_scheduler: "cosine"     # options: "none", "cosine", "linear"

# Evaluation
eval_every_n_epochs: 5
val_dataset_path: "data/dataset/hf_dataset_val"
train_meta_path: "data/dataset/metadata.json"
eval_output_dir: "evaluation"